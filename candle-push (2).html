<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CANDLE.PUSH — Testnet</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080a0d;overflow:hidden}
:root{
  --green:#00e676;--red:#ff3d57;--yellow:#ffd600;
  --bg:#0e1013;--bg2:#13161c;--bg3:#181b21;--bg4:#1d2130;
  --text:#e8eaf0;--muted:#5a6a8a;--border:#1e2d47;
  --font:'Fredoka',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
}
#app{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.logo{font-size:15px;color:var(--green);font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tabs{display:flex;gap:2px;margin-left:10px}
.tab{padding:5px 13px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:var(--font);white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{background:var(--bg4);color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.phase-pill{font-size:9px;padding:3px 9px;border-radius:4px;font-family:var(--mono);font-weight:700;white-space:nowrap}
.phase-pill.live{background:#071a0f;color:var(--green);border:1px solid #0a2918}
.phase-pill.wait{background:#1a1500;color:var(--yellow);border:1px solid #3a2800}
.phase-pill.crash{background:#1a070a;color:var(--red);border:1px solid #2a0a10}
.ms-badge{font-size:9px;color:var(--muted);font-family:var(--mono)}
.deposit-btn{padding:6px 16px;background:var(--green);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.main{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar-left,.sidebar-right{background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;min-width:0;width:clamp(140px,14vw,195px);}
.sidebar-left{border-right:1px solid var(--border)}.sidebar-right{border-left:1px solid var(--border)}
.panel-title{padding:7px 10px;font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.6px;border-bottom:1px solid var(--border);text-transform:uppercase;flex-shrink:0;font-family:var(--mono)}
.chat-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:2px;min-height:0}
.chat-body::-webkit-scrollbar{width:3px}.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chat-msg{font-size:clamp(10px,1.1vw,12px);line-height:1.5;word-break:break-word}
.chat-user{font-weight:600;margin-right:3px}.ct{color:var(--muted)}.ct.w{color:#7dffb3}
.chat-input-wrap{padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--muted)}
.chart-area{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}
.chart-topbar{padding:0 12px;height:34px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow:hidden;}
.cpill{font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:3px;font-weight:700;white-space:nowrap}
.hpills{display:flex;gap:3px;margin-left:auto;overflow:hidden}
.hp{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:3px;font-weight:700;white-space:nowrap}
.hp.g{background:#071a0f;color:var(--green);border:1px solid #0a2918}.hp.r{background:#1a070a;color:var(--red);border:1px solid #2a0a10}
.chart-wrap{flex:1;position:relative;overflow:hidden;min-height:0;min-width:0}
#gc{display:block;position:absolute;top:0;left:0}
.mult-overlay{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:var(--font);font-size:clamp(34px,3.8vw,54px);font-weight:700;pointer-events:none;white-space:nowrap;letter-spacing:-1px;transition:color .2s;}
.mult-overlay.s{color:var(--green);text-shadow:0 0 32px rgba(0,230,118,0.2)}
.mult-overlay.d{color:var(--yellow);text-shadow:0 0 32px rgba(255,214,0,0.2)}
.mult-overlay.c{color:var(--red);text-shadow:0 0 40px rgba(255,61,87,0.38)}
.countdown-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:rgba(14,16,19,.8);opacity:0;pointer-events:none;transition:opacity .3s}
.countdown-overlay.show{opacity:1}
.countdown-num{font-family:var(--font);font-size:clamp(48px,6vw,72px);font-weight:700;color:var(--yellow)}
.countdown-lbl{font-size:13px;color:var(--muted)}
.crash-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:rgba(14,16,19,.92);opacity:0;pointer-events:none;transition:opacity .3s}
.crash-overlay.show{opacity:1}
.crash-title{font-family:var(--font);font-size:clamp(24px,3vw,36px);color:var(--red);font-weight:700;letter-spacing:1px}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.35}}.crash-title{animation:flicker 1s infinite}
.crash-sub{font-size:14px;color:var(--muted)}.crash-cd{font-size:12px;color:var(--muted);margin-top:2px}
.bet-panel{padding:10px 14px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.bet-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bet-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;flex:1;overflow:hidden}
.bet-inp{background:transparent;border:none;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;width:85px}
.bq-wrap{display:flex;gap:3px;padding-right:6px}
.bq{font-size:10px;padding:3px 7px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s}
.bq:hover{color:var(--text);border-color:var(--muted);background:var(--bg3)}
.act-row{display:flex;gap:8px}
@keyframes shine{0%{left:-40%;opacity:0}50%{opacity:.55}100%{left:120%;opacity:0}}
.btn-b{position:relative;overflow:hidden;flex:1;padding:12px;background:linear-gradient(135deg,#00e676,#00c758);color:#000;border:none;border-radius:8px;font-weight:700;font-size:clamp(13px,1.4vw,16px);cursor:pointer;font-family:var(--font);transition:filter .12s,transform .1s;}
.btn-b:hover:not(:disabled){filter:brightness(1.1)}.btn-b:active:not(:disabled){transform:scale(.98)}
.btn-b:disabled{background:linear-gradient(135deg,#0f3d20,#0a2918);color:#1a5530;cursor:not-allowed}
.btn-b::after{content:'';position:absolute;top:-50%;left:-40%;width:35%;height:200%;background:linear-gradient(to right,transparent,rgba(255,255,255,.4),transparent);pointer-events:none;animation:shine 3s ease-in-out infinite}
.btn-b:disabled::after{display:none}
.btn-s{position:relative;overflow:hidden;flex:1;padding:12px;background:linear-gradient(135deg,#ff3d57,#e0001a);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:clamp(13px,1.4vw,16px);cursor:pointer;font-family:var(--font);transition:filter .12s,transform .1s;}
.btn-s:hover:not(:disabled){filter:brightness(1.1)}.btn-s:active:not(:disabled){transform:scale(.98)}
.btn-s:disabled{background:linear-gradient(135deg,#2a0a10,#1a070a);color:#7a1f2d;cursor:not-allowed}
.btn-s::after{content:'';position:absolute;top:-50%;left:-40%;width:35%;height:200%;background:linear-gradient(to right,transparent,rgba(255,255,255,.28),transparent);pointer-events:none;animation:shine 3s ease-in-out 1.5s infinite}
.btn-s:disabled::after{display:none}
.auto-row{display:flex;gap:6px;margin-top:8px}
.ab{flex:1;padding:6px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s;text-align:center}
.ab:hover{border-color:var(--muted);color:var(--text);background:var(--bg3)}
.bal-bar{padding:10px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.bal-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
.bal-val{font-family:var(--mono);font-size:clamp(12px,1.3vw,15px);font-weight:700;color:var(--text)}
.lb-body{overflow-y:auto;flex:1;min-height:0}
.lb-body::-webkit-scrollbar{width:3px}.lb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lb-row{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-bottom:1px solid var(--border);transition:background .1s}
.lb-row:hover{background:var(--bg3)}
.lb-user{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.lb-name{color:var(--text);font-weight:500;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-bet{color:var(--muted);font-family:var(--mono);font-size:9px}
.lp{font-family:var(--mono);font-weight:700;font-size:10.5px;flex-shrink:0;margin-left:3px}
.lp.p{color:var(--green)}.lp.n{color:var(--red)}.lp.w{color:var(--yellow)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;min-width:0">
      <div class="logo">📈 CANDLE.PUSH</div>
      <div class="tabs">
        <button class="tab active">Candle</button>
        <button class="tab">Tile</button>
        <button class="tab">Plinko</button>
      </div>
    </div>
    <div class="topbar-right">
      <span id="phPill" class="phase-pill wait">WAITING</span>
      <span class="ms-badge" id="msLabel">38 ms</span>
      <button class="deposit-btn">Deposit</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar-left">
      <div class="panel-title">Live Chat</div>
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-input-wrap"><input class="chat-input" placeholder="Say something..." id="chatInput"/></div>
    </div>
    <div class="chart-area">
      <div class="chart-topbar">
        <span style="font-size:9px;color:var(--muted);font-family:var(--mono)">Last 100</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--yellow)">🔥 337x</span>
        <span class="cpill" style="background:#071a0f;color:var(--green);border:1px solid #0a2918">2x <span id="c2">43</span></span>
        <span class="cpill" style="background:#1a1500;color:var(--yellow);border:1px solid #3a2800">10x <span id="c10">5</span></span>
        <span class="cpill" style="background:#1a070a;color:var(--red);border:1px solid #2a0a10">50x <span id="c50">0</span></span>
        <div class="hpills" id="hpills"></div>
      </div>
      <div class="chart-wrap" id="chartWrap">
        <canvas id="gc"></canvas>
        <div class="mult-overlay s" id="multDisp">1.00x</div>
        <div class="countdown-overlay" id="cdOverlay">
          <div class="countdown-num" id="cdNum">10</div>
          <div class="countdown-lbl">next round starting...</div>
        </div>
        <div class="crash-overlay" id="crashOverlay">
          <div class="crash-title">RUGGED! 💀</div>
          <div class="crash-sub">Rugged at <span id="crashAt">-</span></div>
          <div class="crash-cd" id="crashCd">Next round in 10s...</div>
        </div>
      </div>
      <div class="bet-panel">
        <div class="bet-row">
          <div class="bet-wrap">
            <input class="bet-inp" type="number" id="betAmt" value="0.010" step="0.001" min="0.001"/>
            <div class="bq-wrap">
              <button class="bq" onclick="adj(0.001)">+0.001</button>
              <button class="bq" onclick="adj(0.01)">+0.01</button>
              <button class="bq" onclick="halfB()">1/2</button>
              <button class="bq" onclick="dblB()">x2</button>
              <button class="bq" onclick="maxB()">MAX</button>
            </div>
          </div>
        </div>
        <div class="act-row">
          <button class="btn-b" id="buyBtn" onclick="placeBet()">Buy 0.010 PUSH</button>
          <button class="btn-s" id="sellBtn" onclick="cashOut()" disabled>Sell 100%</button>
        </div>
        <div class="auto-row">
          <button class="ab" onclick="setAuto(2)">Auto 2x</button>
          <button class="ab" onclick="setAuto(5)">Auto 5x</button>
          <button class="ab" onclick="setAuto(10)">Auto 10x</button>
          <button class="ab" id="autoDisp" onclick="clearAuto()">Auto: Off</button>
        </div>
      </div>
    </div>
    <div class="sidebar-right">
      <div class="bal-bar">
        <div class="bal-lbl">Balance</div>
        <div class="bal-val" id="balDisp">10.000 PUSH</div>
      </div>
      <div class="panel-title">Players</div>
      <div class="lb-body" id="lbBody"></div>
    </div>
  </div>
</div>
<script>
const G='#00e676',R='#ff3d57',Y='#ffd600',BG='#0e1013';
let balance=10,phase='waiting',mult=1,playerBet=0,playerIn=false,autoSell=null,playerBuyMult=1;
let crashPt=0,roundHist=[2.41,1.07,3.22,1.21,2.27,1.42,1.22,1.08];
let canvas,ctx,W,H,rafId,lastTs=0,logicAcc=0;
let price=1,vel=0,momentum=0,vol=0;
let subPhase='pump',subTick=0,subLen=0;
let candles=[],cO=1,cH=1,cL=1,cC=1,tic=0;
const TPC=18;
let crashing=false,crashProg=0,crashAnimAcc=0;
let scaleMin=0.6,scaleMax=2.2,cdTimer=null;
let chartEvents=[];
const PLAYERS=[{name:'Ghostoption',col:'#ff6b9d',bet:0.10},{name:'Kairox',col:'#7b68ee',bet:0.02},{name:'Aldrin',col:'#ffd600',bet:0.08},{name:'lexor',col:'#00bcd4',bet:0.15},{name:'Rune',col:'#ff7043',bet:0.03},{name:'Onyx7',col:'#ab47bc',bet:0.06}];
let plState=[];

function initCanvas(){
  canvas=document.getElementById('gc');
  // Wait for layout to fully settle before reading dimensions
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      resizeCanvas();
      startRound();
    });
  });
}
function resizeCanvas(){
  if(!canvas)return;
  const wrap=document.getElementById('chartWrap');
  const rect=wrap.getBoundingClientRect();
  W=rect.width||wrap.offsetWidth||wrap.clientWidth;
  H=rect.height||wrap.offsetHeight||wrap.clientHeight;
  if(W<10||H<10){W=window.innerWidth-360;H=400;} // fallback
  canvas.width=W;canvas.height=H;
}
window.addEventListener('resize',()=>{resizeCanvas();});

function genCrash(){const r=Math.random();if(r<0.38)return parseFloat((1.0+Math.random()*0.55).toFixed(2));if(r<0.62)return parseFloat((1.55+Math.random()*1.6).toFixed(2));if(r<0.80)return parseFloat((3.2+Math.random()*8).toFixed(2));if(r<0.93)return parseFloat((11+Math.random()*39).toFixed(2));return parseFloat((52+Math.random()*200).toFixed(2));}
function resetPlayers(){plState=PLAYERS.map(p=>({...p,target:parseFloat((1.3+Math.random()*5).toFixed(2)),buyMult:0,cashedAt:0,profit:0,active:true,buyDelay:Math.floor(Math.random()*20)+5}));}
function updateScale(){const all=[price,cH,cL];candles.slice(-30).forEach(c=>{all.push(c.high,c.low);});const dMin=Math.min(...all),dMax=Math.max(...all),range=Math.max(0.5,dMax-dMin),pad=range*0.3;scaleMin+=(dMin-pad-scaleMin)*0.04;scaleMax+=(dMax+pad*1.25-scaleMax)*0.04;}
function toY(v){return H-((v-scaleMin)/(scaleMax-scaleMin))*H;}
function CW(){return Math.min(14,Math.max(8,Math.floor(W/70)));}
function CG(){return Math.max(3,Math.floor(CW()*0.35));}
function STEP(){return CW()+CG();}

function nextSub(){
  const r=Math.random(),p=price,sp=1+p*0.08;
  if(p<1.5){if(r<0.52){subPhase='pump';subLen=12+Math.random()*18;vel=(0.007+Math.random()*0.009)*sp;}else if(r<0.74){subPhase='sideways';subLen=8+Math.random()*14;vel=(Math.random()-.5)*0.002;}else{subPhase='pullback';subLen=8+Math.random()*10;vel=-(0.005+Math.random()*0.007)*sp;}}
  else if(p<4){if(r<0.50){subPhase='pump';subLen=10+Math.random()*14;vel=(0.01+Math.random()*0.013)*sp;}else if(r<0.66){subPhase='sideways';subLen=6+Math.random()*10;vel=(Math.random()-.5)*0.003;}else{subPhase='pullback';subLen=6+Math.random()*10;vel=-(0.008+Math.random()*0.01)*sp;}}
  else{if(r<0.48){subPhase='pump';subLen=8+Math.random()*10;vel=(0.014+Math.random()*0.018)*sp;}else if(r<0.60){subPhase='sideways';subLen=5+Math.random()*8;vel=(Math.random()-.5)*0.005;}else{subPhase='pullback';subLen=5+Math.random()*8;vel=-(0.012+Math.random()*0.015)*sp;}}
  vol=0.003+price*0.0015+Math.random()*0.005;subTick=0;
}
function stepPrice(){subTick++;if(subTick>subLen)nextSub();momentum=momentum*0.86+vel*0.14;const noise=(Math.random()-.5)*2*vol,spike=Math.random()<0.03?((Math.random()-.42)*0.04*price):0;price=Math.max(0.28,price+momentum+noise+spike);return price;}

function render(){if(!ctx||!W||!H)return;ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);drawGrid();drawCandles();if(phase==='live'&&!crashing)drawPriceLine();drawChartEvents();}

function drawGrid(){const steps=5;ctx.textAlign='right';for(let i=0;i<=steps;i++){const v=scaleMin+((scaleMax-scaleMin)/steps)*i,y=toY(v);if(y<4||y>H-4)continue;ctx.strokeStyle='rgba(30,45,71,0.55)';ctx.lineWidth=0.5;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(42,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(90,106,138,0.6)';ctx.font='8px Space Mono,monospace';ctx.fillText(v.toFixed(2)+'x',39,y+3);}ctx.textAlign='left';}

function drawCandles(){const cw=CW(),cs=STEP(),maxVis=Math.floor((W-50)/cs);const formClose=crashing?Math.max(0.28,cO-(cO-0.28)*Math.min(1,crashProg)):cC;const all=[...candles,{open:cO,high:crashing?Math.max(cH,cO):Math.max(cH,formClose),low:crashing?Math.min(cL,formClose*0.68):cL,close:formClose,forming:true}];const vis=all.slice(-maxVis);vis.forEach((c,i)=>{const x=44+i*cs,isG=c.close>=c.open,col=(crashing&&c.forming)?R:(isG?G:R),oY=toY(c.open),cY=toY(c.close),hY=toY(c.high),lY=toY(c.low);ctx.strokeStyle=col;ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(x+cw/2,hY);ctx.lineTo(x+cw/2,lY);ctx.stroke();const bTop=Math.min(oY,cY),bH=Math.max(2.5,Math.abs(oY-cY));ctx.globalAlpha=c.forming?1:0.88;ctx.fillStyle=col;ctx.fillRect(x,bTop,cw,bH);ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=0.5;ctx.strokeRect(x,bTop,cw,bH);});}

function drawPriceLine(){const y=toY(price);if(y<0||y>H)return;ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(0,230,118,0.28)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(42,y);ctx.lineTo(W-2,y);ctx.stroke();ctx.setLineDash([]);const tag=mult.toFixed(4)+'x';ctx.font='bold 9px Space Mono,monospace';const tw=ctx.measureText(tag).width+12;ctx.fillStyle='rgba(0,230,118,0.12)';ctx.fillRect(W-tw-2,y-8,tw,15);ctx.strokeStyle='rgba(0,230,118,0.42)';ctx.lineWidth=0.5;ctx.strokeRect(W-tw-2,y-8,tw,15);ctx.fillStyle=G;ctx.fillText(tag,W-tw+2,y+4);}

function spawnEvent(type,name,col,atMult){const cw=CW(),cs=STEP(),maxVis=Math.floor((W-50)/cs),visIdx=Math.min(candles.length,maxVis-1),x=44+visIdx*cs+cw/2,y=toY(atMult);chartEvents.push({type,name,col,atMult,x,y:Math.max(22,y),age:0,maxAge:280});}

function drawChartEvents(){
  chartEvents=chartEvents.filter(e=>e.age<e.maxAge);
  chartEvents.forEach(e=>{
    e.age++;
    const t=e.age/e.maxAge,alpha=t<0.08?t/0.08:t>0.78?(1-t)/0.22:1,dy=-e.age*0.16,isBuy=e.type==='buy';
    const label=(isBuy?'▲ ':'▼ ')+e.name+' '+e.atMult.toFixed(2)+'x';
    ctx.save();ctx.globalAlpha=alpha;ctx.font='bold 10px Fredoka,sans-serif';
    const tw=ctx.measureText(label).width+16,bx=Math.max(2,Math.min(W-tw-2,e.x-tw/2)),by=e.y+dy;
    // Pill
    ctx.fillStyle=e.col+(isBuy?'30':'28');rr(ctx,bx,by-12,tw,18,5);ctx.fill();
    ctx.strokeStyle=e.col+(isBuy?'cc':'99');ctx.lineWidth=isBuy?1.5:1;rr(ctx,bx,by-12,tw,18,5);ctx.stroke();
    // Connector line
    ctx.strokeStyle=e.col+'44';ctx.lineWidth=0.8;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(e.x,by+8);ctx.lineTo(e.x,e.y+4);ctx.stroke();ctx.setLineDash([]);
    // Text
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(label,bx+tw/2,by+2);
    ctx.textAlign='left';ctx.restore();
  });
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

const LOGIC_MS=130;
function loop(ts){rafId=requestAnimationFrame(loop);const dt=Math.min(ts-lastTs,250);lastTs=ts;if(phase==='live'){logicAcc+=dt;while(logicAcc>=LOGIC_MS){logicAcc-=LOGIC_MS;gameTick();}}if(crashing){crashAnimAcc+=dt;if(crashAnimAcc>=70){crashAnimAcc=0;crashProg+=0.045;}if(crashProg>=1.6){crashing=false;phase='crashed';finishCrash();}}updateScale();render();}

function gameTick(){
  price=stepPrice();mult=parseFloat(price.toFixed(4));cC=mult;
  cH=Math.max(cH,mult+(Math.random()<0.2?Math.random()*0.06*mult:0));
  cL=Math.min(cL,mult-(Math.random()<0.15?Math.random()*0.04*mult:0));
  tic++;if(tic>=TPC){candles.push({open:cO,high:cH,low:cL,close:cC});cO=mult;cH=mult;cL=mult;cC=mult;tic=0;}
  plState.forEach(p=>{if(!p.active)return;if(!p.buyMult&&p.buyDelay>0){p.buyDelay--;if(p.buyDelay===0){p.buyMult=mult;spawnEvent('buy',p.name,p.col,mult);}}if(p.buyMult&&!p.cashedAt&&mult>=p.target){p.cashedAt=mult;p.profit=parseFloat((p.bet*(mult/p.buyMult-1)).toFixed(4));spawnEvent('sell',p.name,p.col,mult);chat(p.name,'sold '+mult.toFixed(2)+'x! +'+p.profit.toFixed(3),true,p.col);}});
  if(autoSell&&mult>=autoSell&&playerIn)cashOut();
  if(mult>=crashPt)beginCrash();
  const d=document.getElementById('multDisp');d.textContent=mult.toFixed(2)+'x';d.className='mult-overlay '+(mult<3?'s':mult<8?'d':'c');
  renderLb();
}

function beginCrash(){phase='crashing';crashing=true;crashProg=0;crashAnimAcc=0;document.getElementById('phPill').textContent='RUGGED';document.getElementById('phPill').className='phase-pill crash';document.getElementById('multDisp').className='mult-overlay c';document.getElementById('buyBtn').disabled=true;document.getElementById('sellBtn').disabled=true;if(playerIn){spawnEvent('sell','You',G,mult);chat('System','RUGGED! -'+playerBet.toFixed(3)+' PUSH 💀',false,R);playerIn=false;playerBet=0;document.getElementById('balDisp').textContent=balance.toFixed(3)+' PUSH';}plState.forEach(p=>{if(p.active&&!p.cashedAt&&p.buyMult)p.profit=-p.bet;});candles.push({open:cO,high:cH,low:Math.max(0.28,cO*0.3),close:Math.max(0.3,cO*0.36)});cO=Math.max(0.3,mult*0.36);cH=cO;cL=Math.max(0.25,cO*0.38);cC=cL;}

function finishCrash(){cancelAnimationFrame(rafId);document.getElementById('crashAt').textContent=mult.toFixed(2)+'x';document.getElementById('crashOverlay').classList.add('show');roundHist.unshift(parseFloat(mult.toFixed(2)));if(roundHist.length>8)roundHist.pop();updateHist();renderLbFinal();let secs=10;document.getElementById('crashCd').textContent='Next round in '+secs+'s...';cdTimer=setInterval(()=>{secs--;document.getElementById('crashCd').textContent='Next round in '+secs+'s...';if(secs<=0){clearInterval(cdTimer);document.getElementById('crashOverlay').classList.remove('show');startCountdown();}},1000);}

function startCountdown(){phase='waiting';document.getElementById('phPill').textContent='WAITING';document.getElementById('phPill').className='phase-pill wait';document.getElementById('multDisp').textContent='1.00x';document.getElementById('multDisp').className='mult-overlay s';document.getElementById('buyBtn').disabled=false;document.getElementById('sellBtn').disabled=true;playerIn=false;playerBet=0;chartEvents=[];const cdO=document.getElementById('cdOverlay'),cdN=document.getElementById('cdNum');cdO.classList.add('show');let secs=10;cdN.textContent=secs;cdTimer=setInterval(()=>{secs--;cdN.textContent=secs;if(secs<=0){clearInterval(cdTimer);cdO.classList.remove('show');startRound();}},1000);}

function placeBet(){if(playerIn)return;const amt=parseFloat(document.getElementById('betAmt').value);if(!amt||amt>balance){chat('System','Not enough balance!',false,R);return;}balance=parseFloat((balance-amt).toFixed(3));playerBet=amt;playerBuyMult=mult;playerIn=true;document.getElementById('balDisp').textContent=balance.toFixed(3)+' PUSH';document.getElementById('sellBtn').disabled=false;document.getElementById('buyBtn').disabled=true;document.getElementById('buyBtn').textContent='In @ '+mult.toFixed(2)+'x';spawnEvent('buy','You',G,mult);chat('Parman','in @ '+mult.toFixed(2)+'x — '+amt.toFixed(3)+' PUSH 🎯',true,G);}

function cashOut(){if(!playerIn)return;const ratio=mult/playerBuyMult,win=parseFloat((playerBet*ratio).toFixed(3)),profit=parseFloat((win-playerBet).toFixed(3));balance=parseFloat((balance+win).toFixed(3));document.getElementById('balDisp').textContent=balance.toFixed(3)+' PUSH';document.getElementById('sellBtn').disabled=true;document.getElementById('buyBtn').disabled=false;document.getElementById('buyBtn').textContent='Buy '+parseFloat(document.getElementById('betAmt').value).toFixed(3)+' PUSH';spawnEvent('sell','You',G,mult);chat('Parman','CASHED '+mult.toFixed(2)+'x 🤑 '+(profit>=0?'+':'')+profit.toFixed(3)+' PUSH',profit>=0,G);playerIn=false;playerBet=0;}

function setAuto(x){autoSell=x;const d=document.getElementById('autoDisp');d.textContent='Auto: '+x+'x';d.style.color=Y;d.style.borderColor=Y;}
function clearAuto(){autoSell=null;const d=document.getElementById('autoDisp');d.textContent='Auto: Off';d.style.color='';d.style.borderColor='';}
function adj(v){let c=parseFloat(document.getElementById('betAmt').value)||0;const n=parseFloat(Math.max(0.001,c+v).toFixed(3));document.getElementById('betAmt').value=n;if(!playerIn)document.getElementById('buyBtn').textContent='Buy '+n.toFixed(3)+' PUSH';}
function halfB(){const c=parseFloat(document.getElementById('betAmt').value)||0.01;const n=parseFloat(Math.max(0.001,c/2).toFixed(3));document.getElementById('betAmt').value=n;if(!playerIn)document.getElementById('buyBtn').textContent='Buy '+n.toFixed(3)+' PUSH';}
function dblB(){const c=parseFloat(document.getElementById('betAmt').value)||0.01;const n=parseFloat(Math.min(balance,c*2).toFixed(3));document.getElementById('betAmt').value=n;if(!playerIn)document.getElementById('buyBtn').textContent='Buy '+n.toFixed(3)+' PUSH';}
function maxB(){document.getElementById('betAmt').value=balance.toFixed(3);if(!playerIn)document.getElementById('buyBtn').textContent='Buy '+balance.toFixed(3)+' PUSH';}

function startRound(){if(cdTimer)clearInterval(cdTimer);cancelAnimationFrame(rafId);phase='live';mult=1;price=1;vel=0.006;momentum=0;vol=0.004;tic=0;candles=[];cO=1;cH=1;cL=1;cC=1;crashing=false;crashProg=0;crashAnimAcc=0;scaleMin=0.6;scaleMax=2.2;chartEvents=[];logicAcc=0;crashPt=genCrash();nextSub();document.getElementById('crashOverlay').classList.remove('show');document.getElementById('cdOverlay').classList.remove('show');document.getElementById('phPill').textContent='LIVE';document.getElementById('phPill').className='phase-pill live';document.getElementById('multDisp').textContent='1.00x';document.getElementById('multDisp').className='mult-overlay s';document.getElementById('buyBtn').disabled=false;document.getElementById('buyBtn').textContent='Buy '+parseFloat(document.getElementById('betAmt').value).toFixed(3)+' PUSH';resetPlayers();renderLb();chat('System','New round! 🎯',true,G);lastTs=performance.now();rafId=requestAnimationFrame(loop);}

function renderLb(){const b=document.getElementById('lbBody');b.innerHTML='';plState.forEach(p=>{const d=document.createElement('div');d.className='lb-row';let ph;if(!p.buyMult)ph=`<span class="lp" style="color:var(--muted)">—</span>`;else if(p.cashedAt)ph=`<span class="lp p">+${p.profit.toFixed(3)}</span>`;else ph=`<span class="lp w">${mult.toFixed(2)}x</span>`;d.innerHTML=`<div class="lb-user"><div class="av" style="background:${p.col}22;color:${p.col}">${p.name[0]}</div><div><div class="lb-name">${p.name}</div><div class="lb-bet">${p.bet.toFixed(3)}</div></div></div>${ph}`;b.appendChild(d);});}
function renderLbFinal(){const b=document.getElementById('lbBody');b.innerHTML='';plState.forEach(p=>{const d=document.createElement('div');d.className='lb-row';let pos=p.profit>=0,label=p.buyMult?(pos?'+':'')+p.profit.toFixed(3):'—';d.innerHTML=`<div class="lb-user"><div class="av" style="background:${p.col}22;color:${p.col}">${p.name[0]}</div><div><div class="lb-name">${p.name}</div><div class="lb-bet">${p.bet.toFixed(3)}</div></div></div><span class="lp ${pos?'p':'n'}">${label}</span>`;b.appendChild(d);});}

function chat(u,t,w,col){const b=document.getElementById('chatBody');const d=document.createElement('div');d.className='chat-msg';d.innerHTML=`<span class="chat-user" style="color:${col||'#aaa'}">${u}</span><span class="ct ${w?'w':''}">${t}</span>`;b.appendChild(d);if(b.children.length>80)b.removeChild(b.children[0]);b.scrollTop=b.scrollHeight;}
function updateHist(){const w=document.getElementById('hpills');w.innerHTML='';roundHist.slice(0,7).forEach(v=>{const s=document.createElement('span');s.className='hp '+(v>=2?'g':'r');s.textContent=v.toFixed(2)+'x';w.appendChild(s);});}

document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.value.trim()){chat('Parman',e.target.value.trim(),false,G);e.target.value='';}});
const BOTS=['Ghostoption','Kairox','lexor','Rune'],BCOLS=['#ff6b9d','#7b68ee','#00bcd4','#ff7043'];
const BMSGS=['holding 💎','PUMP IT 🚀','already rugged again 😭','scared money don\'t make money','50x or bust 💀','bro it always rugs on me 😭','paper hands smh 🤡','i bought the top again LMAO','RUG RUG RUG 💀','nah im holding til 0','one more round i promise','just 2x and i\'m out (lying)','why do i always do this 😭','this is fine 🔥🔥🔥','my whole bag is gone','trust the process 📈','we are so back','we are so not back'];
setInterval(()=>{if(phase==='live'&&Math.random()<0.32){const i=Math.floor(Math.random()*BOTS.length);chat(BOTS[i],BMSGS[Math.floor(Math.random()*BMSGS.length)],false,BCOLS[i]);}},3500);
setInterval(()=>{document.getElementById('msLabel').textContent=(15+Math.floor(Math.random()*55))+' ms';},3000);
[{u:'lexor',t:'cashed 3x lets gooo 🎉',w:true,c:'#00bcd4'},{u:'Ghostoption',t:'i buy it rugs instant 💀',w:false,c:'#ff6b9d'},{u:'Rune',t:'diamond hands only 💎',w:false,c:'#ff7043'},{u:'Kairox',t:'one more round and i quit (lying)',w:false,c:'#7b68ee'}].forEach(m=>chat(m.u,m.t,m.w,m.c));
updateHist();
setTimeout(()=>{initCanvas();},100);
</script>
